# Load Test Configuration - Base Sepolia
#
# Requires FUNDER_KEY environment variable with a funded private key

rpc: https://sepolia.base.org

# Block latency is tracked via block timestamps (no WebSocket required).
# For more precise timing via WebSocket subscription, configure rpc_ws_url with a
# provider that supports WebSocket (the public sepolia.base.org does not).
#
# rpc_ws_url: "wss://your-provider.example/ws"
flashblocks_ws_url: "wss://sepolia.flashblocks.base.org/ws"

sender_count: 10
target_gps: 2100000
duration: "30s"
seed: 12345

# 0.01 ETH per account (covers gas for 30s at 2.1M GPS; drained after test)
funding_amount: "10000000000000000"

transactions:
  - weight: 70
    type: transfer
  - weight: 20
    type: calldata
    max_size: 256
  - weight: 10
    type: precompile
    target: sha256
